services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carebridge}
      POSTGRES_USER: ${POSTGRES_USER:-carebridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carebridge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carebridge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-carebridge}
      DATABASE_USERNAME: ${POSTGRES_USER:-carebridge}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-carebridge}
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: ./apps/web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy

volumes:
  carebridge_pg:
