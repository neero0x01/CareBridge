spring:
  application:
    name: carebridge-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/carebridge}
    username: ${DATABASE_USERNAME:carebridge}
    password: ${DATABASE_PASSWORD:carebridge}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

carebridge:
  jwt:
    # HS256 requires ≥ 256 bits. Override via JWT_SECRET in real deploys.
    secret: ${JWT_SECRET:carebridge-local-dev-secret-change-me-32b}
    issuer: ${JWT_ISSUER:carebridge-local}
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
  auth:
    # Open tenant registration for local/demo; set false (or use prod profile) to disable.
    register-tenant-enabled: ${REGISTER_TENANT_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: INFO
    com.carebridge: INFO
